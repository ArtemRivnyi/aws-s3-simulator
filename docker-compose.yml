version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: aws-s3-simulator
    command: server /data --console-address ":9090"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9090}:9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
      MINIO_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ${MINIO_DATA_PATH:-./minio_data}:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - s3-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  api:
    build: .
    container_name: aws-sim-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=api.app:create_app
      - FLASK_DEBUG=1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-password123}
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      minio:
        condition: service_healthy
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - s3-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  prometheus:
    image: prom/prometheus
    container_name: aws-sim-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - s3-network

  grafana:
    image: grafana/grafana:latest
    container_name: aws-sim-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - s3-network

  loki:
    image: grafana/loki:latest
    container_name: aws-sim-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - s3-network

  promtail:
    image: grafana/promtail:latest
    container_name: aws-sim-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/promtail-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    networks:
      - s3-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

networks:
  s3-network:
    driver: bridge

volumes:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
